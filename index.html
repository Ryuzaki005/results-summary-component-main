<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./assets/css/style.css" />
        <title>Frontend Mentor | Results summary component</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution {
                font-size: 0.6875rem;
                text-align: center;
            }

            .attribution a {
                color: hsl(228, 45%, 44%);
            }
        </style>
    </head>

    <body>
        <main>
            <section id="result">
                <h1>Your Result</h1>
                <div class="score-circle">
                    <span class="score-value">76</span>
                    <span class="score-total">of 100</span>
                </div>
                <h2>Great</h2>
                <p>
                    You scored higher than 65% of the people who have taken
                    these tests.
                </p>
            </section>

            <section id="summary">
                <h2>Summary</h2>

                <ul class="categories">
                    <li>
                        <span class="category-name">Reaction</span>
                        <span class="category-score"
                            ><span class="score">80</span> / 100</span
                        >
                    </li>
                    <li>
                        <span class="category-name">Memory</span>
                        <span class="category-score"
                            ><span class="score">92</span> / 100</span
                        >
                    </li>
                    <li>
                        <span class="category-name">Verbal</span>
                        <span class="category-score"
                            ><span class="score">61</span> / 100</span
                        >
                    </li>
                    <li>
                        <span class="category-name">Visual</span>
                        <span class="category-score"
                            ><span class="score">72</span> / 100</span
                        >
                    </li>
                </ul>

                <button>Continue</button>
            </section>
        </main>

        <footer class="attribution">
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
            >. Coded by <a href="#">Gineston DJIHINTO</a>.
        </footer>
    </body>
</html>
